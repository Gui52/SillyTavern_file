<!DOCTYPE html>
<html lang="zh-CN" class="theme-campus dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>衡江高中 - 学生终端</title>
  <style>
/* ===== 主题系统 - CSS 自定义属性 ===== */
.theme-default {
  --bg-base: #0d0d1a;
  --bg-surface: #16162a;
  --bg-elevated: #1e1e3a;
  --bg-glass: rgba(22, 22, 42, 0.7);
  --border-subtle: #2a2a4a;
  --border-moderate: #3a3a5a;
  --text-primary: #e8e6f0;
  --text-secondary: #a8a0c8;
  --text-muted: #6a6478;
  --accent: #7c5cfc;
  --accent-glow: rgba(124, 92, 252, 0.4);
  --accent-secondary: #5ce0c8;
  --gold: #f0b840;
  --gold-glow: rgba(240, 184, 64, 0.4);
  --danger: #e8465e;
  --danger-glow: rgba(232, 70, 94, 0.4);
  --success: #3cc878;
  --scroll-thumb: #3a3a5a;
  --pbar-bg: #2a2a4a;
  --tag-accent-bg: rgba(124, 92, 252, 0.15);
  --tag-accent-color: #a08cfc;
  --tag-gold-bg: rgba(240, 184, 64, 0.15);
  --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.3);
}

.theme-default:not(.dark),
.theme-default.light {
  --bg-base: #f0ecf5;
  --bg-surface: #e0daf0;
  --bg-elevated: #d0cae0;
  --bg-glass: rgba(224, 218, 240, 0.7);
  --border-subtle: #ccc8d8;
  --border-moderate: #b0a8c0;
  --text-primary: #1a1630;
  --text-secondary: #5a5478;
  --text-muted: #8a84a0;
  --accent: #6c48e4;
  --accent-glow: rgba(108, 72, 228, 0.3);
  --accent-secondary: #48b4a0;
  --gold: #b08020;
  --gold-glow: rgba(176, 128, 32, 0.3);
  --danger: #c0405a;
  --danger-glow: rgba(192, 64, 90, 0.3);
  --success: #30a068;
  --scroll-thumb: #b0a8c0;
  --pbar-bg: #d8d4e0;
  --tag-accent-bg: rgba(108, 72, 228, 0.1);
  --tag-accent-color: #5c38d4;
  --tag-gold-bg: rgba(176, 128, 32, 0.1);
  --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.1);
}


/* ===== 衡江高中 - 学生终端 样式 ===== */

/* --- 主题变量 --- */
:root, .theme-campus.dark {
  --bg-gradient: linear-gradient(135deg, #0f1419 0%, #1a2332 30%, #1f2b3f 60%, #182232 100%);
  --card-bg: rgba(30, 38, 52, 0.95);
  --card-bg-hover: rgba(35, 44, 60, 0.98);
  --text-main: #e2e8f0;
  --text-sub: #cbd5e0;
  --text-muted: #718096;
  --border-color: rgba(255, 255, 255, 0.08);
  --primary-color: #38b2e8;
  --primary-light: #81d4f0;
  --primary-dark: #2980b9;
  --secondary-color: #9f7aea;
  --secondary-light: #c3a5f0;
  --accent-color: #f6ad55;
  --accent-light: #fcd5a0;
  --success-color: #48bb78;
  --success-light: #9ae6b4;
  --danger-color: #f56565;
  --danger-light: #feb2b2;
  --warning-color: #ed8936;
  --shadow-sm: 0 2px 8px rgba(56, 178, 232, 0.08);
  --shadow-md: 0 4px 16px rgba(56, 178, 232, 0.12);
  --shadow-lg: 0 8px 32px rgba(56, 178, 232, 0.16);
  --shadow-card: 0 2px 12px rgba(56, 178, 232, 0.08), 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-card-hover: 0 12px 32px rgba(56, 178, 232, 0.18), 0 4px 8px rgba(0, 0, 0, 0.08);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --safe-area-top: env(safe-area-inset-top, 0px);
  --safe-area-bottom: env(safe-area-inset-bottom, 0px);
}

.theme-campus:not(.dark),
.theme-campus.light {
  --bg-gradient: linear-gradient(135deg, #e8f5f9 0%, #f0f4f8 25%, #f5f0e6 50%, #faf5f0 75%, #e8f0f4 100%);
  --card-bg: rgba(255, 255, 255, 0.94);
  --card-bg-hover: rgba(255, 255, 255, 0.98);
  --text-main: #2d3748;
  --text-sub: #4a5568;
  --text-muted: #a0aec0;
  --border-color: rgba(255, 255, 255, 0.7);
  --primary-color: #38b2e8;
  --primary-light: #81d4f0;
  --primary-dark: #2980b9;
  --secondary-color: #9f7aea;
  --secondary-light: #c3a5f0;
  --accent-color: #f6ad55;
  --accent-light: #fcd5a0;
  --success-color: #48bb78;
  --success-light: #9ae6b4;
  --danger-color: #f56565;
  --danger-light: #feb2b2;
  --warning-color: #ed8936;
  --shadow-sm: 0 2px 8px rgba(56, 178, 232, 0.08);
  --shadow-md: 0 4px 16px rgba(56, 178, 232, 0.12);
  --shadow-lg: 0 8px 32px rgba(56, 178, 232, 0.16);
  --shadow-card: 0 2px 12px rgba(56, 178, 232, 0.08), 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-card-hover: 0 12px 32px rgba(56, 178, 232, 0.18), 0 4px 8px rgba(0, 0, 0, 0.08);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --safe-area-top: env(safe-area-inset-top, 0px);
  --safe-area-bottom: env(safe-area-inset-bottom, 0px);
}

/* --- 基础 --- */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: transparent;
  color: var(--text-main);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* --- SVG图标 --- */
.svg-icon {
  width: 1em;
  height: 1em;
  display: inline-block;
  vertical-align: middle;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: transform 0.3s ease;
}
.svg-icon.svg-bolt { color: var(--warning-color); }
.svg-weather { transition: transform 0.3s ease, opacity 0.3s ease; }

/* 亮色主题图标颜色 */
.theme-campus:not(.dark) .svg-icon,
.theme-campus.light .svg-icon {
  stroke: var(--primary-dark);
}
.theme-campus:not(.dark) .svg-icon.svg-bolt,
.theme-campus.light .svg-icon.svg-bolt {
  color: var(--warning-color);
}
.theme-campus:not(.dark) .svg-theme,
.theme-campus.light .svg-theme {
  stroke: var(--accent-color);
}
.theme-campus:not(.dark) .svg-weather,
.theme-campus.light .svg-weather {
  stroke: var(--primary-color);
}

/* --- 滚动条美化 --- */
::-webkit-scrollbar {
  width: 5px;
  height: 5px;
}
::-webkit-scrollbar-track {
  background: transparent;
  border-radius: 10px;
}
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--primary-color), var(--secondary-color));
  border-radius: 10px;
  transition: all 0.3s ease;
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--primary-light), var(--secondary-light));
  box-shadow: 0 0 8px var(--primary-color);
}
::-webkit-scrollbar-thumb:active {
  background: linear-gradient(180deg, var(--accent-color), var(--warning-color));
}
::-webkit-scrollbar-corner {
  background: transparent;
}
* {
  scrollbar-width: thin;
  scrollbar-color: var(--primary-color) transparent;
}

/* 暗色主题滚动条 */
.theme-campus.dark ::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, rgba(56, 178, 232, 0.6), rgba(159, 122, 234, 0.6));
}
.theme-campus.dark ::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--primary-color), var(--secondary-color));
  box-shadow: 0 0 12px rgba(56, 178, 232, 0.5);
}

/* 亮色主题滚动条 */
.theme-campus:not(.dark) ::-webkit-scrollbar-thumb,
.theme-campus.light ::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, rgba(56, 178, 232, 0.5), rgba(159, 122, 234, 0.5));
}
.theme-campus:not(.dark) ::-webkit-scrollbar-thumb:hover,
.theme-campus.light ::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--primary-color), var(--secondary-color));
  box-shadow: 0 0 10px rgba(56, 178, 232, 0.4);
}

/* --- 仪表板 --- */
.dashboard {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 12px;
  background: var(--bg-gradient);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
}

/* --- 顶部卡片 --- */
.header-card {
  display: flex; align-items: center; gap: 12px;
  padding: 18px 20px;
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  flex-wrap: wrap;
  position: relative;
  animation: headerSlideIn 0.5s ease;
  overflow: hidden;
}
.header-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(56, 178, 232, 0.03) 100%);
  pointer-events: none;
}
@keyframes headerSlideIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
.header-card:hover { background: var(--card-bg-hover); box-shadow: var(--shadow-card-hover); transform: translateY(-2px); }
.header-card:active { transform: translateY(0) scale(0.99); }

.header-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.school-logo {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: #fff;
  transition: transform 0.3s ease;
  animation: logoIn 0.5s ease;
}
@keyframes logoIn {
  from { opacity: 0; transform: rotateY(90deg); }
  to { opacity: 1; transform: rotateY(0); }
}
.header-card:hover .school-logo { transform: scale(1.1) rotate(5deg); }
.header-info h1 { font-size: 20px; font-weight: 700; line-height: 1.2; }
.header-info span { font-size: 12px; color: var(--text-muted); }

.header-center { flex: 1; text-align: center; min-width: 140px; animation: centerIn 0.5s ease backwards; animation-delay: 0.05s; }
@keyframes centerIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
.header-date { font-size: 16px; font-weight: 600; transition: color 0.3s; }
.header-time { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

.header-right { display: flex; gap: 8px; flex-shrink: 0; }
.header-btn {
  width: 40px; height: 40px; border: 1px solid var(--border-color);
  background: var(--card-bg); border-radius: 50%; cursor: pointer;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  animation: btnIn 0.4s ease backwards;
  animation-delay: 0.1s;
}
@keyframes btnIn {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}
.header-btn:hover { background: var(--card-bg-hover); transform: scale(1.15) rotate(10deg); box-shadow: var(--shadow-md); }
.header-btn:active { transform: scale(0.95); }
.header-btn.active { background: var(--primary-color); border-color: var(--primary-color); }
@keyframes themeSwitch {
  0% { transform: scale(1) rotate(0); }
  25% { transform: scale(0.8) rotate(-20deg); }
  50% { transform: scale(0.8) rotate(20deg); }
  75% { transform: scale(1.1) rotate(-10deg); }
  100% { transform: scale(1) rotate(0); }
}
@keyframes btnPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); box-shadow: 0 0 15px var(--primary-color); }
  100% { transform: scale(1); }
}

.header-chip {
  display: flex; align-items: center; gap: 6px;
  background: var(--card-bg); padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border-color); font-size: 13px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  animation: chipIn 0.4s ease backwards;
}
.header-chip:nth-child(1) { animation-delay: 0.15s; }
.header-chip:nth-child(2) { animation-delay: 0.2s; }
.header-chip:nth-child(3) { animation-delay: 0.25s; }
.header-chip:nth-child(4) { animation-delay: 0.3s; }
@keyframes chipIn {
  from { opacity: 0; transform: translateY(-10px) scale(0.8); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.header-chip:hover { transform: translateY(-2px) scale(1.05); border-color: var(--primary-color); box-shadow: var(--shadow-sm); }
.header-chip:active { transform: translateY(0) scale(0.98); }
.header-chip-icon { font-size: 12px; }
.header-chip-text { display: flex; flex-direction: column; line-height: 1.2; }
.header-chip-label { font-size: 11px; color: var(--text-muted); }
.header-chip-value { font-weight: 600; font-size: 14px; transition: color 0.3s; }
.header-chip:hover .header-chip-value { color: var(--primary-color); }

.header-summary {
  display: flex; gap: 10px; flex-wrap: wrap;
  width: 100%; margin-top: 4px; padding-top: 10px;
  border-top: 1px solid var(--border-color);
}

/* --- 折叠卡片 --- */
.card {
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  animation: cardIn 0.5s ease backwards;
  flex-shrink: 0;
}
#card-env { animation-delay: 0.1s; }
#card-status { animation-delay: 0.2s; }
#card-social { animation-delay: 0.3s; }
@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.card:hover { box-shadow: var(--shadow-card-hover); transform: translateY(-2px); }
.card::after {
  content: '';
  position: absolute;
  top: 0; left: -100%; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(56, 178, 232, 0.1), transparent);
  transition: left 0.5s ease;
  pointer-events: none;
}
.card:hover::after { left: 100%; }

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; cursor: pointer;
  transition: background 0.2s;
}
.card-header:hover { background: var(--card-bg-hover); }

.card-title { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 16px; }
.card-icon {
  width: 36px; height: 36px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  transition: transform 0.3s ease;
}
.card:hover .card-icon { transform: scale(1.1) rotate(5deg); }

.card-body {
  padding: 0 20px 20px;
  transition: opacity 0.3s ease, padding 0.3s ease;
  opacity: 1;
}
.card.collapsed .card-body {
  display: none;
}

/* --- 环境网格 --- */
.env-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.env-item {
  padding: 16px 12px; background: var(--card-bg);
  border: 1px solid var(--border-color); border-radius: var(--radius-md);
  text-align: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  animation: envItemIn 0.5s ease backwards;
}
.env-item:nth-child(1) { animation-delay: 0.1s; }
.env-item:nth-child(2) { animation-delay: 0.15s; }
.env-item:nth-child(3) { animation-delay: 0.2s; }
.env-item:nth-child(4) { animation-delay: 0.25s; }
@keyframes envItemIn {
  from { opacity: 0; transform: scale(0.9) rotate(-2deg); }
  to { opacity: 1; transform: scale(1) rotate(0); }
}
.env-item:hover { transform: translateY(-3px) scale(1.05); box-shadow: var(--shadow-md); border-color: var(--primary-color); }
.env-item:active { transform: translateY(0) scale(0.98); }
.env-icon { font-size: 28px; margin-bottom: 6px; transition: transform 0.3s; }
.env-item:hover .env-icon { transform: scale(1.2) rotate(5deg); }
.env-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.env-value { font-size: 15px; font-weight: 600; transition: color 0.3s; }
.env-item:hover .env-value { color: var(--primary-color); }

/* --- 状态 --- */
.status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.status-item {
  padding: 16px; background: var(--card-bg);
  border: 1px solid var(--border-color); border-radius: var(--radius-md);
  display: flex; flex-direction: column; gap: 4px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  animation: statusItemIn 0.4s ease backwards;
}
.status-item:nth-child(1) { animation-delay: 0.1s; }
.status-item:nth-child(2) { animation-delay: 0.15s; }
.status-item:nth-child(3) { animation-delay: 0.2s; }
.status-item:nth-child(4) { animation-delay: 0.25s; }
@keyframes statusItemIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.status-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); border-color: var(--primary-light); }
.status-item.full { grid-column: 1 / -1; }
.status-label { font-size: 12px; color: var(--text-muted); }
.status-value { font-size: 16px; font-weight: 600; transition: color 0.3s; }
.status-value.highlight { color: var(--primary-color); }
.status-item:hover .status-value.highlight { color: var(--accent-color); }

.stamina-section { margin-top: 12px; animation: sectionIn 0.5s ease backwards; animation-delay: 0.25s; }
@keyframes sectionIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.stamina-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; }
.stamina-label { font-weight: 600; }
.stamina-value { color: var(--text-muted); transition: color 0.3s, transform 0.3s; }
.stamina-value.warning { color: var(--warning-color); }
.stamina-value.danger { color: var(--danger-color); animation: dangerPulse 1s ease infinite; }
@keyframes dangerPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.quick-actions { display: flex; gap: 8px; margin-top: 12px; animation: quickActionsIn 0.5s ease backwards; animation-delay: 0.35s; }
@keyframes quickActionsIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.quick-btn {
  flex: 1; padding: 12px; border: 1px solid var(--border-color);
  background: var(--card-bg); border-radius: var(--radius-md);
  color: var(--text-main); font-size: 14px; cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  animation: quickBtnIn 0.5s ease backwards;
  animation-delay: 0.3s;
}
@keyframes quickBtnIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.quick-btn:hover { background: var(--card-bg-hover); border-color: var(--primary-color); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.quick-btn:active { transform: translateY(0) scale(0.98); }
@keyframes btnClick {
  0% { transform: scale(1); }
  50% { transform: scale(0.95); background: var(--success-color); }
  100% { transform: scale(1); }
}

/* --- 社交 --- */
.social-summary {
  display: flex; align-items: center; gap: 14px;
  padding: 16px; background: var(--card-bg);
  border: 1px solid var(--border-color); border-radius: var(--radius-md);
  margin-bottom: 10px;
  animation: socialSummaryIn 0.5s ease;
}
@keyframes socialSummaryIn {
  from { opacity: 0; transform: translateY(-10px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.social-count {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-color), var(--accent-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; color: #fff; flex-shrink: 0;
  transition: transform 0.3s ease;
  animation: countPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes countPop {
  0% { transform: scale(0); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.social-summary:hover .social-count { transform: scale(1.1) rotate(5deg); }
.social-title { font-weight: 600; font-size: 16px; }
.social-desc { font-size: 13px; color: var(--text-muted); }

.char-list { display: flex; flex-direction: column; gap: 8px; animation: listIn 0.4s ease backwards; animation-delay: 0.1s; }
@keyframes listIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.char-card {
  display: flex; flex-direction: column; gap: 8px;
  padding: 14px 16px; background: var(--card-bg);
  border: 1px solid var(--border-color); border-radius: var(--radius-md);
  cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  animation: charCardIn 0.4s ease backwards;
}

/* ===== 公共工具函数 ===== */

/** 获取 MVU 数据 */
export function getMvuData() {
  try {
    return window.Mvu?.getMvuData() ?? {};
  } catch { return {} }
}

/** 安全获取嵌套值 */
export function get(obj, path, fallback = null) {
  try {
    const keys = String(path).split('.');
    let cur = obj;
    for (const k of keys) {
      if (cur == null || typeof cur !== 'object') return fallback;
      cur = cur[k];
    }
    return cur ?? fallback;
  } catch { return fallback }
}

/** 获取稀有度 class */
export function rarityClass(rarity) {
  if (rarity === 'SSR') return 'rarity-ssr';
  if (rarity === 'SR') return 'rarity-sr';
  return 'rarity-r';
}

/** 切换折叠面板 */
export function togglePanel(headerEl) {
  const content = headerEl.nextElementSibling;
  headerEl.classList.toggle('expanded');
  if (content) {
    content.style.display = content.style.display === 'none' ? 'block' : 'none';
  }
}

/** 设置面板折叠 */
export function setupCollapsiblePanels(container) {
  container.querySelectorAll('.panel-header').forEach(header => {
    header.addEventListener('click', () => togglePanel(header));
  });
}

/** 主题管理 */
export const ThemeManager = {
  container: null,

  init(containerEl) {
    this.container = containerEl;
    this.restore();
  },

  restore() {
    try {
      const theme = localStorage.getItem('ui_theme') || 'theme-default';
      const dark = localStorage.getItem('ui_dark');
      if (this.container) {
        this.container.className = theme;
        if (dark === '1' || (dark === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          this.container.classList.add('dark');
        }
      }
    } catch {}
  },

  setTheme(name) {
    if (!this.container) return;
    this.container.className = name;
    const isDark = this.container.classList.contains('dark');
    if (!isDark) this.container.classList.remove('dark');
    try { localStorage.setItem('ui_theme', name) } catch {}
  },

  toggleDark() {
    if (!this.container) return;
    this.container.classList.toggle('dark');
    try {
      localStorage.setItem('ui_dark', this.container.classList.contains('dark') ? '1' : '0');
    } catch {}
  }
};

/** 等待 MVU 初始化 */
export function waitMvu() {
  return new Promise(resolve => {
    if (window.Mvu?.getMvuData) return resolve();
    const check = setInterval(() => {
      if (window.Mvu?.getMvuData) {
        clearInterval(check);
        resolve();
      }
    }, 100);
    setTimeout(() => { clearInterval(check); resolve() }, 10000);
  });
}

function pad(num) {
  return num < 10 ? '0' + num : num;
}

function updateWeatherIcon(weather) {
  const iconEl = document.getElementById('env-weather-icon');

/* ===== 数据填充 ===== */
function populateData() {
  const vars = getMvuData();
  const sysTime = get(vars, 'stat_data.系统.时间', {});
  const sysEnv = get(vars, 'stat_data.系统.环境', {});
  const player = get(vars, 'stat_data.主角', {});

  const dateStr = `${sysTime.年 || '---'}年${sysTime.月 || '-'}月${sysTime.日 || '-'}日`;
  const timeStr = `${pad(sysTime.时 || 0)}:${pad(sysTime.分 || 0)}`;
  setText('sys-date', dateStr);
  setText('sys-time', `${sysTime.星期 || '---'} ${timeStr}`);
  setText('env-date', dateStr);
  const season = sysEnv.季节 || '-';
  const weather = sysEnv.天气 || '-';
  setText('sys-env', `${season}季 / ${weather}`);
  updateWeatherIcon(weather);
  setText('sys-festival', sysEnv.特殊节日 && sysEnv.特殊节日 !== '无' ? sysEnv.特殊节日 : '日常');

  setText('player-class', player.当前班级 || '未分班');
  setText('player-loc', player.当前位置 || '未知');
  setText('player-action', player.当前行为 || '无');
  setText('player-money', `¥${player.金钱 || 0}`);
  setText('player-course', player.当前课程或活动 && player.当前课程或活动 !== '无' ? player.当前课程或活动 : '课间/休息');

  const stamina = player.体力 || 0;
  const staminaVal = document.getElementById('player-stamina-val');
  const staminaBar = document.getElementById('player-stamina-bar');
  if (staminaVal) {
    const newText = `${stamina}/100`;
    if (staminaVal.textContent !== newText) {
      animateValueChange(staminaVal);
      staminaVal.textContent = newText;
    }
  }
  if (staminaBar) {
    const newWidth = `${stamina}%`;
    if (staminaBar.style.width !== newWidth) {
      staminaBar.style.animation = 'none';
      staminaBar.offsetHeight;
      staminaBar.style.animation = 'staminaChange 0.8s ease';
      staminaBar.style.width = newWidth;
    }
  }

  if (staminaVal) staminaVal.classList.remove('warning', 'danger');
  if (staminaBar) staminaBar.classList.remove('warning', 'danger');
  if (stamina < 30) {
    if (staminaVal) staminaVal.classList.add('danger');
    if (staminaBar) staminaBar.classList.add('danger');
  } else if (stamina < 50) {
    if (staminaVal) staminaVal.classList.add('warning');
    if (staminaBar) staminaBar.classList.add('warning');
  }

  populateSocialList(vars);
  syncCompactSummary();
  updateGuideData(vars);
}

function populateSocialList(vars) {
  const charsData = get(vars, 'stat_data.角色', {});
  let charHtml = '';
  let metCount = 0;

  Object.keys(charsData).forEach(charName => {
    const charInfo = charsData[charName];
    if (charInfo && charInfo.已相遇 === true) {
      metCount++;
      const affection = charInfo.好感度 || 0;
      const relation = charInfo.关系状态 || '陌生人';
      const initial = charName.charAt(0);
      charHtml += `
        <div class="char-card" data-char="${charName}" data-affection="${affection}" data-relation="${relation}" role="button" tabindex="0" style="animation-delay: ${(metCount - 1) * 0.08}s">
          <div class="char-header">
            <span class="char-name"><span class="char-avatar">${initial}</span>${charName}</span>
            <span class="char-relation">${relation}</span>
          </div>
          <div class="char-affection">
            <span class="char-affection-label">好感度</span>
            <span class="char-affection-value">${affection}/100</span>
          </div>
          <div class="char-bar"><div class="char-bar-fill" style="width: ${affection}%"></div></div>
        </div>`;
    }
  });

  setText('social-count', String(metCount));
  setText('social-desc', metCount > 0 ? '已相遇的角色' : '等待相遇...');

  const socialList = document.getElementById('social-list');
  const socialCountEl = document.getElementById('social-count');
  if (socialCountEl) {
    socialCountEl.style.animation = 'none';
    socialCountEl.offsetHeight;
    socialCountEl.style.animation = 'countPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
  }
  if (socialList) {
    socialList.innerHTML = metCount === 0
      ? '<div class="empty-state">茫茫人海中，你还在等待那场注定的相遇...</div>'
      : charHtml;
  }
}

function setText(id, text) {
  const el = document.getElementById(id);
  if (el) {
    if (el.textContent !== text) {
      el.classList.remove('value-flash');
      void el.offsetWidth;
      el.classList.add('value-flash');
      el.textContent = text;
    }
  }
}

function animateValueChange(el) {
  if (!el) return;
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'valueChange 0.3s ease';
}

function syncCompactSummary() {
  const getText = (id) => document.getElementById(id)?.textContent || '未知';
  setText('summary-loc', getText('player-loc'));
  setText('summary-action', getText('player-action'));
  setText('summary-stamina', getText('player-stamina-val'));

  { name: '季川', identity: '图书馆管理员' },
  { name: '方屿', identity: '美术老师' },
  { name: '裴烬', identity: '理科学院·年级第一' },
  { name: '纪淮', identity: '文科学院·班长' },
  { name: '白鹿', identity: '理科学院·跳级新生' },
  { name: '向南', identity: '体育学院·短跑特长生' },
  { name: '王铁柱', identity: '食堂' },
  { name: '杰克', identity: '交换生·橄榄球' },
  { name: '布雷迪', identity: '交换生·摔跤' },
  { name: '迪伦', identity: '交换生' },
  { name: '小野健太', identity: '交换生·棒球' },
  { name: '陆沉', identity: '教导主任' },
  { name: '顾衍', identity: '田径教练' },
  { name: '沈知远', identity: '校长' },
  { name: '柳善宇', identity: '体育学院·游泳' },
];

let guideData = [];
let currentFilter = 'all';
let currentSearch = '';

function updateGuideData(vars) {
  const charsData = get(vars, 'stat_data.角色', {});
  guideData = allCharacters.map(char => {
    const charInfo = charsData[char.name] || {};
    return {
      name: char.name,
      identity: char.identity,
      met: charInfo.已相遇 === true,
      affection: charInfo.好感度 || 0,
      relation: charInfo.关系状态 || '陌生人',
    };
  });
}

function openGuideModal() {
  const modal = document.getElementById('guide-modal');
  if (modal) {
    modal.classList.add('active');
    renderGuideGrid();
    document.getElementById('guide-search')?.focus();
  }
}

function closeGuideModal() {
  document.getElementById('guide-modal')?.classList.remove('active');
  document.getElementById('header-toggle')?.focus();
}

function renderGuideGrid() {
  const grid = document.getElementById('guide-char-grid');
  const empty = document.getElementById('guide-empty');
  if (!grid) return;

  let filtered = guideData;

  if (currentFilter === 'met') {
    filtered = filtered.filter(c => c.met);
  } else if (currentFilter === 'unmet') {
    filtered = filtered.filter(c => !c.met);
  }

  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(c => c.name.toLowerCase().includes(q) || c.identity.toLowerCase().includes(q));
  }

  if (filtered.length === 0) {
    grid.innerHTML = '';
    if (empty) empty.style.display = 'block';
    return;
  }

  if (empty) empty.style.display = 'none';

  grid.innerHTML = filtered.map((char, idx) => {
    const initial = char.name.charAt(0);
    const metClass = char.met ? 'met' : 'unmet';
    return `
      <div class="guide-char-card ${metClass}" data-name="${char.name}" data-affection="${char.affection}" data-relation="${char.relation}" role="button" tabindex="0" style="animation-delay: ${idx * 0.05}s">
        <div class="guide-char-avatar">${initial}</div>
        <div class="guide-char-name">${char.name}</div>
        <div class="guide-char-identity">${char.identity}</div>
        <div class="guide-char-relation">${char.met ? char.relation : '未相遇'}</div>
      </div>`;
  }).join('');
}

/* ===== 好感度等级 ===== */
function getAffectionLevel(affection) {
  if (affection >= 90) return { level: '家人', color: 'var(--danger-color)' };
  if (affection >= 75) return { level: '恋人', color: 'var(--accent-color)' };
  if (affection >= 60) return { level: '在意', color: 'var(--success-color)' };
  if (affection >= 40) return { level: '朋友', color: 'var(--primary-color)' };
  if (affection >= 20) return { level: '已相识', color: 'var(--text-sub)' };
  return { level: '陌生人', color: 'var(--text-muted)' };
}

/* ===== 角色详情模态框 ===== */
function showCharModal(charName, affection, relation) {
  const initial = charName.charAt(0);
  const levelInfo = getAffectionLevel(affection);

  setText('modal-avatar', initial);
  setText('modal-name', charName);
  setText('modal-relation', relation);
  const affVal = document.getElementById('modal-affection-value');
  if (affVal) {
    affVal.style.animation = 'none';
    affVal.offsetHeight;
    affVal.style.animation = 'valueChange 0.4s ease';
    affVal.innerHTML = `${affection} <span>/ 100</span>`;
  }
  const barFill = document.getElementById('modal-bar-fill');
  if (barFill) {
    barFill.style.animation = 'none';
    barFill.offsetHeight;
    barFill.style.animation = 'staminaChange 0.8s ease';
    barFill.style.width = `${affection}%`;
  }

  const levels = ['陌生人', '已相识', '朋友', '在意', '恋人', '家人'];
  const modalLevels = document.getElementById('modal-levels');
  if (modalLevels) {
    modalLevels.innerHTML = levels.map(lv =>
      `<span class="level-badge ${lv === levelInfo.level ? 'active' : ''}">${lv}</span>`
    ).join('');
  }

  document.getElementById('char-modal')?.classList.add('active');
}

function closeCharModal() {
  document.getElementById('char-modal')?.classList.remove('active');
  document.getElementById('header-toggle')?.focus();
}

/* ===== 主题管理 ===== */
function updateThemeIcon(isDark) {
  const btn = document.getElementById('toggle-theme');
  if (!btn) return;
  const useEl = btn.querySelector('use');
  if (useEl) {
    useEl.setAttribute('href', isDark ? '#svg-moon' : '#svg-sun');
  }
}

function loadTheme() {
  try {
    const saved = localStorage.getItem('hengjiang-theme');
    if (saved === 'light') {
      document.documentElement.classList.remove('dark');
      updateThemeIcon(false);
    } else {
      document.documentElement.classList.add('dark');
      updateThemeIcon(true);
    }
  } catch {}
}

function saveTheme(isDark) {
  try { localStorage.setItem('hengjiang-theme', isDark ? 'dark' : 'light') } catch {}
}

/* ===== 折叠管理 ===== */
function toggleCardCollapse(card) {
  const isCollapsed = card.classList.toggle('collapsed');
  const header = card.querySelector('.card-header');
  if (header) header.setAttribute('aria-expanded', String(!isCollapsed));
  saveCollapseState(card.id, isCollapsed);
}

function loadCollapseStates() {
  try {
    const states = JSON.parse(localStorage.getItem('hengjiang-collapse') || '{}');
    Object.keys(states).forEach(id => {
      if (states[id]) document.getElementById(id)?.classList.add('collapsed');
    });
  } catch {}
}

function saveCollapseState(id, isCollapsed) {
  try {
    const states = JSON.parse(localStorage.getItem('hengjiang-collapse') || '{}');
    states[id] = isCollapsed;
    localStorage.setItem('hengjiang-collapse', JSON.stringify(states));
  } catch {}
}

/* ===== 初始化 ===== */
async function init() {
  loadTheme();
  loadCollapseStates();

  await waitMvu();
  populateData();
  initMap();

  (() => {
    try {
      if (window.Mvu?.events?.VARIABLE_UPDATE_ENDED) {
        SillyTavern.getContext().eventOn(Mvu.events.VARIABLE_UPDATE_ENDED, () => {
          populateData();
          enhanceDynamicCards();
        });
      }
    } catch (e) {
      try {
        Mvu?.events?.on?.(Mvu.events.VARIABLE_UPDATE_ENDED, () => {
          populateData();
          enhanceDynamicCards();
        });
      } catch (e2) {
        console.warn('StatusBar: cannot subscribe to VARIABLE_UPDATE_ENDED');
      }
    }
  })();

  document.querySelectorAll('.card-header').forEach(header => {
    header.addEventListener('click', () => toggleCardCollapse(header.closest('.card')));
  });

  document.getElementById('social-list')?.addEventListener('click', e => {
    const card = e.target.closest('.char-card');
    if (card) {
      showCharModal(card.dataset.char, Number(card.dataset.affection), card.dataset.relation);
    }
  });

  document.getElementById('modal-close')?.addEventListener('click', closeCharModal);
  document.getElementById('char-modal')?.addEventListener('click', e => {
    if (e.target === e.currentTarget) closeCharModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('char-modal')?.classList.contains('active')) closeCharModal();
      if (document.getElementById('guide-modal')?.classList.contains('active')) closeGuideModal();
    }
  });

  document.getElementById('toggle-theme')?.addEventListener('click', function(e) {
    e.stopPropagation();
    const isDark = document.documentElement.classList.toggle('dark');
    this.style.animation = 'none';
    this.offsetHeight;
    this.style.animation = 'themeSwitch 0.5s ease';
    updateThemeIcon(isDark);
    saveTheme(isDark);
  });

  document.getElementById('btn-guide')?.addEventListener('click', function(e) {
    e.stopPropagation();
    this.style.animation = 'none';
    this.offsetHeight;
    this.style.animation = 'btnPulse 0.4s ease';
    openGuideModal();
  });

  document.getElementById('guide-close')?.addEventListener('click', closeGuideModal);
  document.getElementById('guide-modal')?.addEventListener('click', e => {
    if (e.target === e.currentTarget) closeGuideModal();
  });

  document.querySelectorAll('.guide-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.guide-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      renderGuideGrid();
    });
  });

  document.getElementById('guide-search')?.addEventListener('input', e => {
    currentSearch = e.target.value.trim();
    renderGuideGrid();
  });

  document.getElementById('guide-char-grid')?.addEventListener('click', e => {
    const card = e.target.closest('.guide-char-card');
    if (card && card.classList.contains('met')) {
      closeGuideModal();
      setTimeout(() => {
        showCharModal(card.dataset.name, Number(card.dataset.affection), card.dataset.relation);
      }, 150);
    }
  });

  window.addEventListener('map-marker-click', e => {
    const { charName, affection, relation } = e.detail;
    showCharModal(charName, affection, relation);
  });

  document.getElementById('quick-rest')?.addEventListener('click', function() {
    this.style.animation = 'none';
    this.offsetHeight;
    this.style.animation = 'btnClick 0.3s ease';
    if (window.Mvu) {
      Mvu.setVariable('stat_data.主角.体力', 100);
      Mvu.commit();
    }
  });
}

function enhanceDynamicCards() {
  document.querySelectorAll('.char-card, .guide-char-card').forEach(el => {
    el.setAttribute('tabindex', '0');
    el.setAttribute('role', 'button');
  });
  document.querySelectorAll('.guide-char-card').forEach((el, idx) => {
    el.style.animationDelay = `${idx * 0.03}s`;
  });
}

$(() => { init(); });

</script>
