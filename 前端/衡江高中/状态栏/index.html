    <g id="marker-player" visibility="hidden">
      <circle r="8" fill="#2196F3" opacity="0.3">
        <animate attributeName="r" values="6;12;6" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle r="5" fill="#2196F3" stroke="#fff" stroke-width="1.5"/>
      <text id="marker-player-label" font-size="9" fill="#1a3a5a" font-weight="bold" text-anchor="middle" dy="-14">玩家</text>
    </g>
  </g>
  <g id="map-legend" transform="translate(20, 540)">
    <rect width="140" height="45" rx="6" fill="rgba(240,235,227,0.9)" stroke="#c8b89a" stroke-width="0.5"/>
    <circle cx="18" cy="16" r="5" fill="#2196F3"/>
    <text x="30" y="20" font-size="8" fill="#444">玩家位置</text>
    <circle cx="18" cy="34" r="5" fill="#ed8936"/>
    <text x="30" y="38" font-size="8" fill="#444">角色位置</text>
  </g>
</svg></div>
          <div class="map-controls">
            <button class="map-btn map-btn-zoomin" id="map-zoom-in" title="放大">+</button>
            <button class="map-btn map-btn-zoomout" id="map-zoom-out" title="缩小">−</button>
            <button class="map-btn map-btn-reset" id="map-zoom-reset" title="重置">↺</button>
          </div>
          <div class="map-legend">
            <div class="map-legend-item">
              <div class="map-legend-dot" style="background:#2196F3;"></div>
              <span>玩家</span>
            </div>
            <div class="map-legend-item">
              <div class="map-legend-dot" style="background:#ed8936;"></div>
              <span>角色</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card" id="card-status">
      <div class="card-header" role="button" tabindex="0" aria-expanded="true">
        <div class="card-title">
          <div class="card-icon" style="background: linear-gradient(135deg, #48bb78, #9ae6b4);">
            <svg class="svg-icon"><use href="#svg-user"></use></svg>
          </div>
          当前状态
        </div>
      </div>
      <div class="card-body">
        <div class="status-grid">
          <div class="status-item">
            <div class="status-label">班级</div>
            <div class="status-value" id="player-class">----</div>
          </div>
          <div class="status-item">
            <div class="status-label">余额</div>
            <div class="status-value highlight" id="player-money">----</div>
          </div>
          <div class="status-item full">
            <div class="status-label">当前行为</div>
            <div class="status-value" id="player-action">----</div>
          </div>
          <div class="status-item full">
            <div class="status-label">课程/活动</div>
            <div class="status-value highlight" id="player-course">----</div>
          </div>
        </div>
        <div class="stamina-section">
          <div class="stamina-header">
            <span class="stamina-label"><svg class="svg-icon svg-bolt"><use href="#svg-bolt"></use></svg> 体力状态</span>
            <span class="stamina-value" id="player-stamina-val">0/100</span>
          </div>
          <div class="stamina-bar">
            <div class="stamina-fill" id="player-stamina-bar" style="width: 0%"></div>
          </div>
        </div>
        <div class="quick-actions">
          <button class="quick-btn" id="quick-rest">
            <svg class="svg-icon"><use href="#svg-home"></use></svg> 休息恢复
          </button>
        </div>
      </div>
    </div>

    <div class="card" id="card-social">
      <div class="card-header" role="button" tabindex="0" aria-expanded="true">
        <div class="card-title">
          <div class="card-icon" style="background: linear-gradient(135deg, #ed8936, #fbd38d);">
            <svg class="svg-icon"><use href="#svg-heart"></use></svg>
          </div>
          社交关系
        </div>
      </div>
      <div class="card-body">
        <div class="social-summary">
          <div class="social-count" id="social-count">0</div>
          <div class="social-info">
            <div class="social-title">已相遇角色</div>
            <div class="social-desc" id="social-desc">等待相遇...</div>
          </div>
        </div>
        <div class="char-list" id="social-list"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="char-modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-name">
      <div class="modal-header">
        <button class="modal-close" id="modal-close">
          <svg class="svg-icon"><use href="#svg-close"></use></svg>
        </button>
        <div class="modal-avatar" id="modal-avatar">?</div>
        <div class="modal-name" id="modal-name">角色名称</div>
        <span class="modal-relation" id="modal-relation">关系</span>
      </div>
      <div class="modal-body">
        <div class="modal-affection">
          <div class="modal-affection-label">好感度</div>
          <div class="modal-affection-value" id="modal-affection-value">0 <span>/ 100</span></div>
        </div>
        <div class="modal-bar"><div class="modal-bar-fill" id="modal-bar-fill" style="width: 0%"></div></div>
        <div class="modal-level" id="modal-levels"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="guide-modal">
    <div class="modal-content guide-modal-content" role="dialog" aria-modal="true" aria-labelledby="guide-title">
      <div class="guide-header">
        <button class="modal-close" id="guide-close">
          <svg class="svg-icon"><use href="#svg-close"></use></svg>
        </button>
        <h2 class="guide-title" id="guide-title">
          <svg class="svg-icon"><use href="#svg-book"></use></svg> 人物图鉴
        </h2>
        <div class="guide-tabs">
          <button class="guide-tab active" data-filter="all">全部</button>
          <button class="guide-tab" data-filter="met">已相遇</button>
          <button class="guide-tab" data-filter="unmet">未相遇</button>
        </div>
      </div>
      <div class="guide-search">
        <svg class="svg-icon search-icon"><use href="#svg-search"></use></svg>
        <input type="text" class="guide-search-input" id="guide-search" placeholder="搜索角色名称...">
      </div>
      <div class="guide-body" id="guide-body">
        <div class="guide-char-grid" id="guide-char-grid"></div>
        <div class="guide-empty" id="guide-empty" style="display:none;">
          <div class="guide-empty-icon">
            <svg class="svg-icon"><use href="#svg-search"></use></svg>
          </div>
          <div class="guide-empty-text">暂无匹配角色</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="https://cdn.jsdelivr.net/gh/Gui52/SillyTavern_file@main/前端/衡江高中/状态栏/script.js"></script>
</body>
</html>
