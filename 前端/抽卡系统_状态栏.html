<!doctype html>
<html lang="zh-CN" class="theme-default dark">
<head>
  <meta charset="UTF-8">
  <title>猛男抽卡系统状态栏</title>
  <style>
/* ===== 主题系统 - CSS 自定义属性 ===== */
.theme-default {
  --bg-base: #0d0d1a;
  --bg-surface: #16162a;
  --bg-elevated: #1e1e3a;
  --bg-glass: rgba(22, 22, 42, 0.7);
  --border-subtle: #2a2a4a;
  --border-moderate: #3a3a5a;
  --text-primary: #e8e6f0;
  --text-secondary: #a8a0c8;
  --text-muted: #6a6478;
  --accent: #7c5cfc;
  --accent-glow: rgba(124, 92, 252, 0.4);
  --accent-secondary: #5ce0c8;
  --gold: #f0b840;
  --gold-glow: rgba(240, 184, 64, 0.4);
  --danger: #e8465e;
  --danger-glow: rgba(232, 70, 94, 0.4);
  --success: #3cc878;
  --scroll-thumb: #3a3a5a;
  --pbar-bg: #2a2a4a;
  --tag-accent-bg: rgba(124, 92, 252, 0.15);
  --tag-accent-color: #a08cfc;
  --tag-gold-bg: rgba(240, 184, 64, 0.15);
  --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.3);
}

.theme-default:not(.dark),
.theme-default.light {
  --bg-base: #f0ecf5;
  --bg-surface: #e0daf0;
  --bg-elevated: #d0cae0;
  --bg-glass: rgba(224, 218, 240, 0.7);
  --border-subtle: #ccc8d8;
  --border-moderate: #b0a8c0;
  --text-primary: #1a1630;
  --text-secondary: #5a5478;
  --text-muted: #8a84a0;
  --accent: #6c48e4;
  --accent-glow: rgba(108, 72, 228, 0.3);
  --accent-secondary: #48b4a0;
  --gold: #b08020;
  --gold-glow: rgba(176, 128, 32, 0.3);
  --danger: #c0405a;
  --danger-glow: rgba(192, 64, 90, 0.3);
  --success: #30a068;
  --scroll-thumb: #b0a8c0;
  --pbar-bg: #d8d4e0;
  --tag-accent-bg: rgba(108, 72, 228, 0.1);
  --tag-accent-color: #5c38d4;
  --tag-gold-bg: rgba(176, 128, 32, 0.1);
  --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.1);
}

</style>
  <style>
/* ===== 抽卡系统状态栏样式 ===== */
body {
  margin: 0;
  padding: 0;
  font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
  font-size: 14px;
  line-height: 1.6;
  background: transparent;
}

#status-bar-container {
  background: var(--bg-surface, #1a1a1a);
  border-radius: 8px;
  box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5), 0 0 5px rgba(51, 51, 51, 0.7);
  border: 1px solid var(--border-subtle, #333);
  overflow: hidden;
  color: var(--text-primary, #fff);
}

/* --- 顶部栏 --- */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: linear-gradient(135deg, #2c3e50, #1a252f);
  border-bottom: 2px solid var(--danger, #e74c3c);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

#points-display {
  font-size: 20px;
  font-weight: bold;
  color: var(--gold, #f1c40f);
}

#ten-pull-notice {
  background-color: var(--danger, #e74c3c);
  color: white;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: bold;
  animation: pulse 1.5s infinite;
}

.topbar-right {
  text-align: right;
  font-size: 12px;
  color: var(--text-muted, #999);
}

#world-time, #world-location {
  display: block;
}

/* --- 内容区 --- */
.content-area {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.panel-header {
  background-color: var(--bg-elevated, #2a2a2a);
  padding: 8px 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-radius: 4px;
  transition: background-color 0.2s ease;
}

.panel-header:hover {
  background-color: var(--border-moderate, #383838);
}

.panel-header .arrow {
  transition: transform 0.3s ease;
}

.panel-header.expanded .arrow {
  transform: rotate(90deg);
}

.panel-content {
  padding: 12px;
  background-color: rgba(0, 0, 0, 0.2);
  border-radius: 0 0 4px 4px;
  border-top: 1px solid var(--border-subtle, #444);
  display: none;
}

.panel-content[style*="display: block"] {
  display: block;
}

/* --- 网格与数据项 --- */
.grid-display {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px 16px;
}

.data-item {
  display: flex;
  flex-direction: column;
}

.data-label {
  font-size: 12px;
  color: var(--text-secondary, #aaa);
  margin-bottom: 2px;
}

.data-value {
  font-weight: bold;
}

.data-value.highlight-red { color: var(--danger, #e74c3c); }
.data-value.highlight-pink { color: #ff7675; }

.rarity-ssr { color: var(--gold, #ffd700); }
.rarity-sr { color: #c082c4; }
.rarity-r { color: #87ceeb; }

/* --- 角色卡 --- */
.character-card {
  border: 1px solid var(--border-subtle, #444);
  border-radius: 4px;
  padding: 12px;
  margin-bottom: 12px;
}

.character-card:last-child { margin-bottom: 0; }

/* --- 任务 --- */
.task-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.task-item {
  display: flex;
  align-items: center;
  padding: 8px;
  background-color: #2c3e50;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.task-item:hover {
  background-color: #34495e;
  transform: translateX(4px);
}

.task-tag {
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 10px;
  margin-right: 8px;
  flex-shrink: 0;
}

.task-tag-system { background-color: #3498db; }
.task-tag-favor { background-color: var(--danger, #e74c3c); }
.task-tag-world { background-color: var(--success, #2ecc71); }

.task-desc {
  flex-grow: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.task-progress {
  margin: 0 10px;
  font-size: 12px;
  color: #bdc3c7;
}

.task-reward {
  color: var(--gold, #f1c40f);
  font-weight: bold;
  font-size: 12px;
}

.task-status-count {
  display: flex;
  gap: 16px;
  margin-bottom: 12px;
}

.task-status-count .green { color: var(--success, #2ecc71); }
.task-status-count .red { color: var(--danger, #e74c3c); }

/* --- 模态框 --- */
#modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

#modal-card {
  background: #2c3e50;
  border-radius: 12px;
  border: 2px solid #3498db;
  width: 90%;
  max-width: 500px;
  box-shadow: 0 0 20px rgba(52, 152, 219, 0.5);
}

.modal-header {
  padding: 12px 16px;
  background: linear-gradient(135deg, #34495e, #2c3e50);
  border-bottom: 1px solid #3498db;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-header h3 {
  margin: 0;
  font-size: 18px;
}

#modal-close {
  font-size: 24px;
  cursor: pointer;
  color: #bdc3c7;
  transition: color 0.2s;
}

#modal-close:hover { color: #fff; }

.modal-body {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.progress-bar-container {
  width: 100%;
  height: 10px;
  background-color: #1a252f;
  border-radius: 5px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #3498db, var(--success, #2ecc71));
  border-radius: 5px;
  transition: width 0.3s ease;
}

/* --- 占位符 --- */
.placeholder {
  color: var(--text-muted, #777);
  text-align: center;
  padding: 20px;
}

/* --- 动画 --- */
@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.05); opacity: 0.7; }
  100% { transform: scale(1); opacity: 1; }
}

</style>
</head>
<body>
<div id="status-bar-container">
  <!-- 顶部栏 -->
  <div class="topbar">
    <div class="topbar-left">
      <span id="points-display">...</span>
      <span id="ten-pull-notice" style="display:none">可十连!</span>
    </div>
    <div class="topbar-right">
      <span id="world-time">时间: 未知</span>
      <span id="world-location">地点: 未知</span>
    </div>
  </div>

  <div class="content-area">
    <!-- 卡池状态 -->
    <div class="collapsible-panel">
      <div class="panel-header expanded">
        <span>卡池状态</span>
        <span class="arrow">▶</span>
      </div>
      <div class="panel-content" style="display:block">
        <div class="grid-display">
          <div class="data-item"><span class="data-label">当前主题</span><span class="data-value" id="pool-theme">...</span></div>
          <div class="data-item"><span class="data-label">累计抽数</span><span class="data-value" id="pool-pulls">...</span></div>
          <div class="data-item"><span class="data-label">SSR保底</span><span class="data-value highlight-red" id="pool-ssr-pity">...</span></div>
        </div>
        <hr style="border-color:var(--border-subtle,#444);margin:12px 0">
        <div class="grid-display">
          <div class="data-item"><span class="data-label">卡池描述</span><span class="data-value" id="pool-desc">...</span></div>
          <div class="data-item"><span class="data-label">概率</span><span class="data-value" id="pool-rates">...</span></div>
          <div class="data-item"><span class="data-label">保底规则</span><span class="data-value" id="pool-rules">...</span></div>
          <div class="data-item"><span class="data-label">保底状态</span><span class="data-value" id="pool-pity-status">...</span></div>
        </div>
        <hr style="border-color:var(--border-subtle,#444);margin:12px 0">
        <div class="data-item">
          <span class="data-label">已获得角色</span>
          <div class="data-value" id="pool-characters">无</div>
        </div>
      </div>
    </div>

    <!-- 角色卡面板 -->
    <div class="collapsible-panel">
      <div class="panel-header expanded">
        <span>角色卡</span>
        <span class="arrow">▶</span>
      </div>
      <div class="panel-content" id="character-list" style="display:block">
        <div class="placeholder">暂无角色卡</div>
      </div>
    </div>

    <!-- 背包 -->
    <div class="collapsible-panel">
      <div class="panel-header">
        <span>背包库存</span>
        <span class="arrow">▶</span>
      </div>
      <div class="panel-content" id="inventory-list">
        <div class="placeholder">背包空空如也</div>
      </div>
    </div>

    <!-- 任务 -->
    <div class="collapsible-panel">
      <div class="panel-header">
        <span>任务系统</span>
        <span class="arrow">▶</span>
      </div>
      <div class="panel-content">
        <div class="task-status-count">
          <div class="data-item"><span class="data-label">今日/累计完成</span><span class="data-value" id="task-completion-stats">0/0</span></div>
          <div class="data-item"><span class="data-label">系统任务</span><span class="data-value" id="task-count-system">0/3</span></div>
          <div class="data-item"><span class="data-label">好感任务</span><span class="data-value" id="task-count-favor">0/3</span></div>
          <div class="data-item"><span class="data-label">世界任务</span><span class="data-value" id="task-count-world">0/3</span></div>
        </div>
        <div class="task-list" id="task-list-active">
          <div class="placeholder">没有正在进行的任务</div>
        </div>
      </div>
    </div>

    <!-- 技能 -->
    <div class="collapsible-panel">
      <div class="panel-header">
        <span>技能系统</span>
        <span class="arrow">▶</span>
      </div>
      <div class="panel-content">
        <div class="data-item">
          <span class="data-label">已装备技能</span>
          <div id="equipped-skills-list"><div class="placeholder">未装备任何技能</div></div>
        </div>
        <hr style="border-color:var(--border-subtle,#444);margin:12px 0">
        <div class="data-item">
          <span class="data-label">技能熟练度</span>
          <div id="skill-proficiency-list"><div class="placeholder">无技能熟练度信息</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 模态框 -->
<div id="modal-overlay">
  <div id="modal-card">
    <div class="modal-header">
      <h3 id="modal-title">任务详情</h3>
      <span id="modal-close">&times;</span>
    </div>
    <div class="modal-body" id="modal-body-content"></div>
  </div>
</div>

<script>
import { getMvuData, get, rarityClass, setupCollapsiblePanels, ThemeManager, waitMvu } from '../../公共/utils.js';

/* ===== 数据填充 ===== */
function populateData() {
  const data = get(getMvuData(), 'stat_data', {});

  /* 系统与世界状态 */
  const system = get(data, '系统', {});
  const points = get(system, '积分', 0);
  document.getElementById('points-display').textContent = `${points} P`;
  document.getElementById('ten-pull-notice').style.display = points >= 1000 ? 'inline' : 'none';

  const world = get(system, '世界状态', {});
  document.getElementById('world-time').textContent = `时间: ${get(world, '时间', '未知')} / ${get(world, '日期', '未知')} / ${get(world, '星期', '未知')}`;
  document.getElementById('world-location').textContent = `地点: ${get(world, '地点', '未知')} | 天气: ${get(world, '天气', '未知')}`;

  /* 卡池 */
  const pool = get(system, '卡池', {});
  const cur = get(pool, '当前卡池信息', {});
  const pityCount = 80 - (get(pool, '主题抽卡数', 0) % 80);
  setText('pool-theme', get(pool, '当前主题', '待选择'));
  setText('pool-pulls', String(get(pool, '主题抽卡数', 0)));
  setText('pool-ssr-pity', `${pityCount} 抽`);
  setText('pool-desc', get(cur, '主题描述', '...'));
  setHtml('pool-rates', `<span class="rarity-ssr">SSR: ${get(cur, 'SSR概率', '?')}%</span> / <span class="rarity-sr">SR: ${get(cur, 'SR概率', '?')}%</span> / <span class="rarity-r">R: ${get(cur, 'R概率', '?')}%</span>`);
  setText('pool-rules', get(cur, '保底机制', '...'));
  setText('pool-pity-status', `首次十连: ${get(cur, '首次十连', '否')} | 十连计数: ${get(cur, '十连计数', 0)}`);
  setText('pool-characters', get(cur, '角色列表', []).join(', ') || '无');

  /* 角色卡 */
  const characters = get(data, '角色卡', {});
  const charList = document.getElementById('character-list');
  charList.innerHTML = '';
  if (Object.keys(characters).length === 0) {
    charList.innerHTML = '<div class="placeholder">暂无角色卡</div>';
  } else {
    Object.entries(characters).forEach(([name, ch]) => {
      const r = get(ch, '基础信息.稀有度', 'SR');
      const div = document.createElement('div');
      div.className = 'character-card';
      div.innerHTML = `
        <div class="grid-display">
          <div class="data-item"><span class="data-label">姓名</span><span class="data-value">${name}</span></div>
          <div class="data-item"><span class="data-label">稀有度</span><span class="data-value ${rarityClass(r)}">${r}</span></div>
          <div class="data-item"><span class="data-label">年龄</span><span class="data-value">${get(ch, '基础信息.年龄', '?')}</span></div>
          <div class="data-item"><span class="data-label">职业</span><span class="data-value">${get(ch, '基础信息.职业', '?')}</span></div>
          <div class="data-item"><span class="data-label">好感度</span><span class="data-value">${get(ch, '状态.好感度', 0)}</span></div>
          <div class="data-item"><span class="data-label">当前动作</span><span class="data-value">${get(ch, '状态.当前动作', '...')}</span></div>
          <div class="data-item"><span class="data-label">表情</span><span class="data-value">${get(ch, '状态.表情', '...')}</span></div>
          <div class="data-item"><span class="data-label">想法</span><span class="data-value">${get(ch, '状态.想法', '...')}</span></div>
          <div class="data-item"><span class="data-label">服装</span><span class="data-value highlight-pink">${get(ch, '状态.服装', '...')}</span></div>
        </div>`;
      charList.appendChild(div);
    });
  }

  /* 背包 */
  const inventory = get(system, '库存.道具卡', {});
  const invList = document.getElementById('inventory-list');
  invList.innerHTML = '';
  if (Object.keys(inventory).length === 0) {
    invList.innerHTML = '<div class="placeholder">背包空空如也</div>';
  } else {
    const grid = document.createElement('div');
    grid.className = 'grid-display';
    Object.entries(inventory).forEach(([name, item]) => {
      const itemDiv = document.createElement('div');
      itemDiv.className = 'data-item';
      itemDiv.innerHTML = `<span class="data-label">${name} (x${item.数量})</span><span class="data-value ${rarityClass(item.稀有度)}">${item.稀有度} - ${item.类型}</span>`;
      grid.appendChild(itemDiv);
    });
    invList.appendChild(grid);
  }

  /* 任务 */
  const user = get(data, '用户', {});
  const tasks = get(system, '任务', {});
  const taskConfig = get(system, '任务配置', {});
  const minTasks = taskConfig.最小活跃任务数 || 3;
  const tracking = get(user, '任务追踪', {});
  setText('task-completion-stats', `${get(tracking, '今日任务完成数', 0)} / ${get(tracking, '累计任务完成数', 0)}`);

  const countActive = (obj, statusKey, activeVal) => Object.values(obj || {}).filter(t => t[statusKey] === activeVal).length;
  const sysA = countActive(tasks.系统任务, '状态', '未完成');
  const favA = countActive(tasks.好感任务, '状态', '进行中');
  const wrlA = countActive(tasks.世界任务, '状态', '进行中');

  updateTaskCount('task-count-system', sysA, minTasks);
  updateTaskCount('task-count-favor', favA, minTasks);
  updateTaskCount('task-count-world', wrlA, minTasks);

  const activeList = document.getElementById('task-list-active');
  activeList.innerHTML = '';
  const allTasks = { ...get(tasks, '系统任务', {}), ...get(tasks, '好感任务', {}), ...get(tasks, '世界任务', {}) };
  let hasActive = false;

  Object.entries(allTasks).forEach(([id, t]) => {
    let type, cls, active;
    if (tasks.系统任务?.[id]) { type = '系统'; cls = 'system'; active = t.状态 === '未完成'; }
    else if (tasks.好感任务?.[id]) { type = '好感'; cls = 'favor'; active = t.状态 === '进行中'; }
    else if (tasks.世界任务?.[id]) { type = '世界'; cls = 'world'; active = t.状态 === '进行中'; }

    if (active) {
      hasActive = true;
      const el = document.createElement('div');
      el.className = 'task-item';
      el.dataset.taskId = id;
      el.dataset.taskType = cls;
      el.innerHTML = `<span class="task-tag task-tag-${cls}">${type}</span><span class="task-desc">${t.描述}</span><span class="task-progress">${t.进度 || 0}%</span><span class="task-reward">+${t.奖励积分}P</span>`;
      activeList.appendChild(el);
    }
  });

  if (!hasActive) activeList.innerHTML = '<div class="placeholder">没有正在进行的任务</div>';

  /* 技能 */
  const equipped = get(user, '装备技能', {});
  const skillPro = get(user, '技能熟练度', {});

  const eqDiv = document.getElementById('equipped-skills-list');
  eqDiv.innerHTML = '';
  if (Object.keys(equipped).length === 0) {
    eqDiv.innerHTML = '<div class="placeholder">未装备任何技能</div>';
  } else {
    const g = document.createElement('div'); g.className = 'grid-display';
    Object.entries(equipped).forEach(([n, s]) => {
      const d = document.createElement('div'); d.className = 'data-item';
      d.innerHTML = `<span class="data-label">${n}</span><span class="data-value">Lv.${s.等级} (EXP: ${s.经验值})</span>`;
      g.appendChild(d);
    });
    eqDiv.appendChild(g);
  }

  const spDiv = document.getElementById('skill-proficiency-list');
  spDiv.innerHTML = '';
  if (Object.keys(skillPro).length === 0) {
    spDiv.innerHTML = '<div class="placeholder">无技能熟练度信息</div>';
  } else {
    const g = document.createElement('div'); g.className = 'grid-display';
    Object.entries(skillPro).forEach(([n, v]) => {
      const d = document.createElement('div'); d.className = 'data-item';
      d.innerHTML = `<span class="data-label">${n}</span><span class="data-value">${v}</span>`;
      g.appendChild(d);
    });
    spDiv.appendChild(g);
  }
}

function setText(id, text) {
  const el = document.getElementById(id);
  if (el) el.textContent = text;
}

function setHtml(id, html) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
}

function updateTaskCount(id, active, min) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = `${active} / ${min}`;
  el.className = 'data-value ' + (active >= min ? 'green' : 'red');
}

/* ===== 模态框 ===== */
function showTaskModal(taskId, taskType) {
  const data = get(getMvuData(), 'stat_data', {});
  const tasks = get(data, '系统.任务', {});
  const groupMap = { system: '系统任务', favor: '好感任务', world: '世界任务' };
  const task = tasks?.[groupMap[taskType]]?.[taskId];
  if (!task) return;

  const info = [
    { label: '任务描述', value: task.描述 },
    { label: '状态', value: task.状态 },
  ];
  if (taskType === 'favor') {
    info.push({ label: '关联角色', value: task.角色 });
    info.push({ label: '触发好感度', value: task.触发好感度 });
  }
  if (taskType === 'world') {
    info.push({ label: '关联主题', value: task.主题 });
    info.push({ label: '触发条件', value: task.触发条件 });
  }
  info.push({ label: '奖励积分', value: task.奖励积分 });
  info.push({ label: '创建时间', value: new Date(task.创建时间).toLocaleString() });
  if (task.完成时间) info.push({ label: '完成时间', value: new Date(task.完成时间).toLocaleString() });

  const body = document.getElementById('modal-body-content');
  body.innerHTML = info.map(i =>
    `<div class="data-item"><span class="data-label">${i.label}</span><span class="data-value">${i.value}</span></div>`
  ).join('');

  if (task.进度 !== undefined) {
    body.innerHTML += `<div class="progress-bar-container"><div class="progress-bar" style="width:${task.进度}%"></div></div>`;
  }

  document.getElementById('modal-overlay').style.display = 'flex';
}

function hideModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

/* ===== 初始化 ===== */
async function init() {
  await waitMvu();

  ThemeManager.init(document.documentElement);
  populateData();
  setupCollapsiblePanels(document.querySelector('.content-area'));

  /* 任务点击 */
  document.getElementById('task-list-active').addEventListener('click', e => {
    const item = e.target.closest('.task-item');
    if (item) showTaskModal(item.dataset.taskId, item.dataset.taskType);
  });

  /* 模态框 */
  document.getElementById('modal-close').addEventListener('click', hideModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) hideModal();
  });

  /* MVU 更新监听 */
  if (window.Mvu?.events?.VARIABLE_UPDATE_ENDED) {
    eventOn(Mvu.events.VARIABLE_UPDATE_ENDED, populateData);
  }
}

document.addEventListener('DOMContentLoaded', init);

</script>
</body>
