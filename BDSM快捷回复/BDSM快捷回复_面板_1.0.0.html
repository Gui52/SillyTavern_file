<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BDSM快捷回复</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --font-main: 'Microsoft YaHei', 'Segoe UI', sans-serif;
  --font-mono: 'Cascadia Code', 'Consolas', monospace;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-full: 999px;
  --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.25);
  --shadow-elevated: 0 8px 32px rgba(0, 0, 0, 0.35);

  /* Purple theme (default) */
  --bg-base: #0d0d1a;
  --bg-surface: #16162a;
  --bg-elevated: #1e1e3a;
  --bg-glass: rgba(22, 22, 42, 0.85);
  --border-subtle: #2a2a4a;
  --border-moderate: #3a3a5a;
  --text-primary: #e8e6f0;
  --text-secondary: #a8a0c8;
  --text-muted: #6a6478;
  --accent: #7c5cfc;
  --accent-glow: rgba(124, 92, 252, 0.4);
  --accent-secondary: #5ce0c8;
  --gold: #f0b840;
  --gold-glow: rgba(240, 184, 64, 0.4);
  --danger: #e8465e;
  --danger-glow: rgba(232, 70, 94, 0.4);
  --success: #3cc878;
  --scroll-thumb: #3a3a5a;
}

/* Red theme */
.theme-red {
  --accent: #e8465e;
  --accent-glow: rgba(232, 70, 94, 0.4);
  --accent-secondary: #ff8c69;
}

/* Teal theme */
.theme-teal {
  --accent: #3cc878;
  --accent-glow: rgba(60, 200, 120, 0.4);
  --accent-secondary: #5ce0c8;
}

/* Gold theme */
.theme-gold {
  --accent: #f0b840;
  --accent-glow: rgba(240, 184, 64, 0.4);
  --accent-secondary: #ffcc66;
}

/* Light mode */
.theme-default:not(.dark),
.theme-purple:not(.dark),
.theme-red:not(.dark),
.theme-teal:not(.dark),
.theme-gold:not(.dark) {
  --bg-base: #f0ecf5;
  --bg-surface: #e0daf0;
  --bg-elevated: #d0cae0;
  --bg-glass: rgba(224, 218, 240, 0.9);
  --border-subtle: #ccc8d8;
  --border-moderate: #b0a8c0;
  --text-primary: #1a1630;
  --text-secondary: #5a5478;
  --text-muted: #8a84a0;
  --scroll-thumb: #b0a8c0;
}

body {
  font-family: var(--font-main);
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  overflow: hidden;
}

#app {
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ============ Panel ============ */
.panel {
  width: 420px;
  max-height: 90vh;
  background: var(--bg-surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-moderate);
  box-shadow: var(--shadow-elevated);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: all 0.3s ease;
}

.panel.minimized {
  width: 200px;
  height: auto;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: linear-gradient(135deg, var(--bg-elevated) 0%, var(--bg-surface) 100%);
  border-bottom: 1px solid var(--border-subtle);
  cursor: move;
  user-select: none;
}

.panel-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 15px;
  color: var(--text-primary);
}

.panel-icon {
  font-size: 18px;
}

.panel-actions {
  display: flex;
  gap: 4px;
}

.icon-btn {
  width: 28px;
  height: 28px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.icon-btn:hover {
  background: var(--bg-elevated);
  color: var(--text-primary);
}

.icon-btn.close:hover {
  color: var(--danger);
}

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.panel-body::-webkit-scrollbar {
  width: 6px;
}

.panel-body::-webkit-scrollbar-thumb {
  background: var(--scroll-thumb);
  border-radius: 3px;
}

/* ============ Tag Bar ============ */
.tag-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tag-btn {
  padding: 5px 12px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-full);
  background: var(--bg-elevated);
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.tag-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.tag-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.tag-btn.add-tag {
  border-style: dashed;
  color: var(--text-muted);
}

/* ============ Draw Section ============ */
.draw-section {
  display: flex;
  gap: 10px;
  align-items: center;
}

.btn-lg {
  padding: 10px 20px;
  font-size: 14px;
}

.select-wrap {
  flex: 1;
  display: flex;
  gap: 6px;
}

select {
  flex: 1;
  padding: 8px 10px;
  border: 1px solid var(--border-moderate);
  border-radius: var(--radius-sm);
  background: var(--bg-elevated);
  color: var(--text-primary);
  font-size: 12px;
  outline: none;
}

select:focus {
  border-color: var(--accent);
}

/* ============ Result Area ============ */
.result-area {
  background: var(--bg-elevated);
  border-radius: var(--radius-md);
  padding: 14px;
  border: 1px solid var(--border-subtle);
}

.result-tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}

.result-tag {
  padding: 2px 8px;
  background: rgba(124, 92, 252, 0.15);
  color: var(--accent);
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 600;
}

.result-text {
  line-height: 1.7;
  font-size: 13px;
  color: var(--text-primary);
  white-space: pre-wrap;
}

/* ============ Action Bar ============ */
.action-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.action-bar .btn {
  flex: 1;
  min-width: 70px;
}

/* ============ Custom Input ============ */
.custom-input-area {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px solid var(--border-subtle);
}

.custom-input-area textarea {
  width: 100%;
  min-height: 60px;
  padding: 10px 12px;
  border: 1px solid var(--border-moderate);
  border-radius: var(--radius-md);
  background: var(--bg-elevated);
  color: var(--text-primary);
  font-size: 12px;
  resize: none;
  outline: none;
  font-family: var(--font-main);
}

.custom-input-area textarea:focus {
  border-color: var(--accent);
}

/* ============ Group Picker ============ */
.group-picker {
  background: var(--bg-elevated);
  border-radius: var(--radius-md);
  border: 1px solid var(--border-moderate);
  overflow: hidden;
}

.group-picker-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  background: var(--bg-surface);
  font-weight: 600;
  font-size: 13px;
  border-bottom: 1px solid var(--border-subtle);
}

.group-picker-list {
  max-height: 200px;
  overflow-y: auto;
}

.group-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 13px;
}

.group-item:hover {
  background: var(--bg-surface);
}

.group-item .item-count {
  margin-left: auto;
  color: var(--text-muted);
  font-size: 11px;
}

.close-btn-sm {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 2px 6px;
}

.close-btn-sm:hover {
  color: var(--danger);
}

/* ============ Settings Panel ============ */
.settings-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.settings-panel {
  width: 320px;
  background: var(--bg-surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-moderate);
  box-shadow: var(--shadow-elevated);
  overflow: hidden;
}

.settings-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border-subtle);
  font-weight: 700;
  font-size: 14px;
}

.close-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  border-radius: var(--radius-sm);
}

.close-btn:hover {
  color: var(--danger);
  background: var(--bg-surface);
}

.settings-body {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.settings-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}

.settings-section {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.settings-label {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 600;
}

/* ============ Toggle Switch ============ */
.toggle {
  position: relative;
  width: 44px;
  height: 24px;
}

.toggle input {
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle-slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--bg-elevated);
  border: 1px solid var(--border-moderate);
  border-radius: var(--radius-full);
  transition: all 0.3s;
}

.toggle-slider:before {
  position: absolute;
  content: '';
  height: 18px;
  width: 18px;
  left: 2px;
  bottom: 2px;
  background: var(--text-muted);
  border-radius: 50%;
  transition: all 0.3s;
}

.toggle input:checked + .toggle-slider {
  background: var(--accent);
  border-color: var(--accent);
}

.toggle input:checked + .toggle-slider:before {
  transform: translateX(20px);
  background: #fff;
}

/* ============ Theme Colors ============ */
.theme-colors {
  display: flex;
  gap: 8px;
}

.color-swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
}

.color-swatch:hover {
  transform: scale(1.1);
}

.color-swatch.active {
  border-color: var(--text-primary);
  box-shadow: 0 0 8px var(--accent-glow);
}

/* ============ Buttons ============ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 14px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  background: var(--bg-elevated);
  color: var(--text-primary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-main);
}

.btn:hover:not(:disabled) {
  border-color: var(--accent);
  color: var(--accent);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.btn-primary:hover:not(:disabled) {
  background: var(--accent);
  filter: brightness(1.1);
  color: #fff;
}

.btn-danger {
  color: var(--danger);
  border-color: var(--danger);
}

.btn-danger:hover:not(:disabled) {
  background: var(--danger);
  color: #fff;
}

.btn-outline {
  background: transparent;
}

.btn-outline.active {
  background: rgba(240, 184, 64, 0.15);
  border-color: var(--gold);
  color: var(--gold);
}

.btn-sm {
  padding: 5px 10px;
  font-size: 11px;
}

.btn-row {
  display: flex;
  gap: 8px;
}

/* ============ Input ============ */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.input-group label {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 600;
}

.input-group input {
  padding: 8px 12px;
  border: 1px solid var(--border-moderate);
  border-radius: var(--radius-sm);
  background: var(--bg-elevated);
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
}

.input-group input:focus {
  border-color: var(--accent);
}

/* ============ Toast ============ */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-moderate);
  border-radius: var(--radius-full);
  color: var(--text-primary);
  font-size: 13px;
  box-shadow: var(--shadow-card);
  animation: toastIn 0.3s ease;
  z-index: 9999;
}

.toast.success {
  border-color: var(--success);
  color: var(--success);
}

.toast.error {
  border-color: var(--danger);
  color: var(--danger);
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ============ Responsive ============ */
@media (max-width: 480px) {
  .panel {
    width: 95vw;
    max-height: 85vh;
  }
}
</style>
</head>
<body>
<div id="app" class="theme-default" :class="{ dark: isDark }">

  <!-- 设置面板 -->
  <div class="settings-overlay" v-if="showSettings" @click="showSettings = false">
    <div class="settings-panel" @click.stop>
      <div class="settings-header">
        <span><i class="fa-solid fa-gear"></i> 设置</span>
        <button class="close-btn" @click="showSettings = false"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="settings-body">
        <div class="settings-row">
          <span>暗色模式</span>
          <label class="toggle">
            <input type="checkbox" v-model="isDark" @change="saveDark">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-row">
          <span>主题色</span>
          <div class="theme-colors">
            <span class="color-swatch active" data-theme="theme-purple" style="background:#7c5cfc;" @click="setTheme('theme-purple')"></span>
            <span class="color-swatch" data-theme="theme-red" style="background:#e8465e;" @click="setTheme('theme-red')"></span>
            <span class="color-swatch" data-theme="theme-teal" style="background:#3cc878;" @click="setTheme('theme-teal')"></span>
            <span class="color-swatch" data-theme="theme-gold" style="background:#f0b840;" @click="setTheme('theme-gold')"></span>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-label">内置回复库</div>
          <button class="btn btn-sm" @click="importDefaultLib"><i class="fa-solid fa-download"></i> 导入默认库</button>
          <button class="btn btn-sm btn-outline" @click="exportLib"><i class="fa-solid fa-upload"></i> 导出</button>
        </div>
        <div class="settings-section">
          <div class="settings-label">数据管理</div>
          <button class="btn btn-sm btn-danger" @click="clearAllData"><i class="fa-solid fa-trash"></i> 清除全部数据</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 分组编辑弹窗 -->
  <div class="settings-overlay" v-if="editingGroup !== null" @click="editingGroup = null">
    <div class="settings-panel" @click.stop>
      <div class="settings-header">
        <span><i class="fa-solid fa-folder"></i> {{ editingGroup === -1 ? '新建分组' : '编辑分组' }}</span>
        <button class="close-btn" @click="editingGroup = null"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="settings-body">
        <div class="input-group">
          <label>分组名称</label>
          <input type="text" v-model="groupEditName" placeholder="输入分组名称">
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" @click="saveGroup"><i class="fa-solid fa-check"></i> 保存</button>
          <button class="btn btn-danger" v-if="editingGroup !== -1 && editingGroup > 0" @click="deleteGroup"><i class="fa-solid fa-trash"></i> 删除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 主面板 -->
  <div class="panel" :class="{ minimized: isMinimized }">
    <div class="panel-header" @mousedown="startDrag">
      <div class="panel-title">
        <span class="panel-icon">🔮</span>
        <span>BDSM快捷回复</span>
      </div>
      <div class="panel-actions">
        <button class="icon-btn" @click="isMinimized = !isMinimized" :title="isMinimized ? '展开' : '最小化'">
          <i :class="isMinimized ? 'fa-solid fa-maximize' : 'fa-solid fa-minimize'"></i>
        </button>
        <button class="icon-btn" @click="showSettings = true" title="设置"><i class="fa-solid fa-gear"></i></button>
        <button class="icon-btn close" @click="$emit('close')" title="关闭"><i class="fa-solid fa-xmark"></i></button>
      </div>
    </div>

    <div class="panel-body" v-show="!isMinimized">
      <!-- tag 分类栏 -->
      <div class="tag-bar">
        <button class="tag-btn" :class="{ active: activeTag === null }" @click="activeTag = null">全部</button>
        <button class="tag-btn" v-for="tag in defaultTags" :key="tag" :class="{ active: activeTag === tag }" @click="activeTag = tag">{{ tag }}</button>
        <button class="tag-btn" v-for="g in customGroups" :key="'g_' + g.id" :class="{ active: activeTag === 'group_' + g.id }" @click="activeTag = 'group_' + g.id">
          <i class="fa-solid fa-folder"></i> {{ g.name }}
        </button>
        <button class="tag-btn" :class="{ active: activeTag === 'favorites' }" @click="activeTag = 'favorites'">
          <i class="fa-solid fa-star" style="color:var(--gold);"></i> 收藏
        </button>
        <button class="tag-btn add-tag" @click="editingGroup = -1"><i class="fa-solid fa-plus"></i> 分组</button>
      </div>

      <!-- 抽取方式 -->
      <div class="draw-section">
        <button class="btn btn-primary btn-lg" @click="randomDraw">
          <i class="fa-solid fa-shuffle"></i> 随机抽取
        </button>
        <div class="select-wrap">
          <select v-model="selectedContentId">
            <option value="">-- 自选内容 --</option>
            <option v-for="item in filteredContent" :key="item.id" :value="item.id">
              {{ item.text.substring(0, 30) }}{{ item.text.length > 30 ? '...' : '' }}
            </option>
          </select>
          <button class="btn btn-outline" @click="useSelected" :disabled="!selectedContentId">使用</button>
        </div>
      </div>

      <!-- 当前抽取结果 -->
      <div class="result-area" v-if="currentText">
        <div class="result-tag-list" v-if="currentItem && currentItem.tags">
          <span class="result-tag" v-for="tag in currentItem.tags" :key="tag">{{ tag }}</span>
        </div>
        <div class="result-text">{{ currentText }}</div>
      </div>

      <!-- 操作按钮 -->
      <div class="action-bar" v-if="currentText">
        <button class="btn btn-primary" @click="sendToChat"><i class="fa-solid fa-paper-plane"></i> 发送</button>
        <button class="btn btn-outline" @click="copyText"><i class="fa-solid fa-copy"></i> 复制</button>
        <button class="btn btn-outline" :class="{ active: isFavorited }" @click="toggleFavorite">
          <i :class="isFavorited ? 'fa-solid fa-star' : 'fa-regular fa-star'"></i> {{ isFavorited ? '已收藏' : '收藏' }}
        </button>
        <button class="btn btn-outline" @click="showGroupPicker = true"><i class="fa-solid fa-folder-plus"></i> 存到分组</button>
      </div>

      <!-- 分组选择弹窗 -->
      <div class="group-picker" v-if="showGroupPicker">
        <div class="group-picker-header">存到分组 <button class="close-btn-sm" @click="showGroupPicker = false"><i class="fa-solid fa-xmark"></i></button></div>
        <div class="group-picker-list">
          <div class="group-item" v-for="g in customGroups" :key="g.id" @click="saveToGroup(g.id)">
            <i class="fa-solid fa-folder"></i> {{ g.name }}
            <span class="item-count">{{ g.items ? g.items.length : 0 }}</span>
          </div>
          <div class="group-item" @click="editingGroup = -1; showGroupPicker = false;">
            <i class="fa-solid fa-plus"></i> 新建分组
          </div>
        </div>
      </div>

      <!-- 自定义输入 -->
      <div class="custom-input-area">
        <textarea v-model="customText" placeholder="输入自定义回复内容... (按 Enter 发送，Shift+Enter 换行)" @keydown.enter.exact.prevent="addCustomContent"></textarea>
        <button class="btn btn-sm btn-primary" @click="addCustomContent"><i class="fa-solid fa-plus"></i> 添加</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" v-if="toast.show" :class="toast.type">{{ toast.msg }}</div>
</div>

<script src="script.js"></script>
</body>
</html>
